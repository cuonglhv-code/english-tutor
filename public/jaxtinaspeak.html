                            <i className="fa-solid fa-trophy text-4xl text-white"></i>

        // --- COMPONENT: AUDIO RECORDER ---
        function AudioRecorder({ setHasRecorded }) {
            const [recording, setRecording] = useState(false);
            const [url, setUrl] = useState("");
            const mr = useRef(null);
            const chunks = useRef([]);

            useEffect(() => {
                return () => {
                    if (mr.current) {
                        mr.current.stream.getTracks().forEach(t => t.stop());
                    }
                };
            }, []);

            const toggle = async () => {
                if (!recording) {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mr.current = new MediaRecorder(stream);
                        mr.current.ondataavailable = e => { if (e.data.size > 0) chunks.current.push(e.data); };
                        mr.current.onstop = () => {
                            const blob = new Blob(chunks.current, { type: 'audio/mp3' }); 
                            const audioUrl = URL.createObjectURL(blob);
                            setUrl(audioUrl);
                            if (setHasRecorded) setHasRecorded(true);
                            chunks.current = [];
                        };
                        mr.current.start();
                        setRecording(true);
                        AudioPlayer.stop();
                    } catch (e) { alert("Microphone access required!"); }
                } else {
                    if (mr.current) {
                        mr.current.stop();
                        mr.current.stream.getTracks().forEach(t => t.stop());
                    }
                    setRecording(false);
                }
            };

            const handleDelete = () => {
                setUrl("");
                if (setHasRecorded) setHasRecorded(false);
            };

            return (
                <div className="mt-6 pt-6 border-t border-white/10 z-20 relative">
                    {!url ? (
                        <button onClick={toggle} className={`w-full py-4 rounded-xl font-bold transition flex items-center justify-center gap-3 text-sm uppercase tracking-wider ${recording ? 'bg-fuchsia-600 text-white border border-fuchsia-400 animate-pulse shadow-[0_0_20px_rgba(217,70,239,0.5)]' : 'bg-indigo-600 text-white hover:bg-indigo-500 border border-indigo-400/50 shadow-lg'}`}>
                            {recording ? <><i className="fa-solid fa-stop"></i> Stop Recording</> : <><div className="w-3 h-3 bg-white rounded-full animate-pulse shadow-[0_0_10px_white]"></div> Start Recording</>}
                        </button>
                    ) : (
                        <div className="bg-black/50 p-4 rounded-xl border border-cyan-400/30 flex items-center gap-4 animate-fade-in backdrop-blur-md shadow-[0_0_15px_rgba(6,182,212,0.1)]">
                            <div className="w-10 h-10 rounded-full bg-cyan-400/20 flex items-center justify-center text-cyan-400"><i className="fa-solid fa-microphone-lines"></i></div>
                            <div className="flex-1">
                                <div className="text-xs text-gray-300 mb-1">Your Answer</div>
                                <audio src={url} controls className="h-8 w-full opacity-90 filter invert grayscale contrast-200" />
                            </div>
                            <a href={url} download={`my_answer_${Date.now()}.mp3`} className="text-white hover:text-cyan-400 px-3 flex flex-col items-center text-xs transition">
                                <i className="fa-solid fa-download text-lg mb-1"></i> MP3
                            </a>
                            <button onClick={handleDelete} className="text-fuchsia-400 hover:text-fuchsia-300 text-sm transition">Delete</button>
                        </div>
                    )}
                </div>
            );
        }

        function LandingPage({ topics, onStart }) {
            const [step, setStep] = useState('mode_select'); // 'mode_select', 'random_config', 'topic_select', 'topic_ready'
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [questionLimit, setQuestionLimit] = useState(5);
            const [randomLimit, setRandomLimit] = useState(5);

            const toggleTopic = (id) => {
                const newSet = new Set(selectedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedIds(newSet);
            };

            const handleStartTopicConfig = () => {
                if (selectedIds.size === 0) return alert("Vui lòng chọn ít nhất 1 chủ đề!");
                setStep('topic_ready');
            };

            const confirmStartTopic = (mode) => {
                let chosenTopics = topics.filter(t => selectedIds.has(t.id));
                let allQs = chosenTopics.flatMap(t => t.questions);
                
                if (mode === 'random') {
                    allQs = allQs.sort(() => 0.5 - Math.random());
                }
                
                if (questionLimit > 0) {
                    allQs = allQs.slice(0, questionLimit);
                }

                onStart({ 
                    title: "Practice Session", 
                    questions: allQs 
                });
            };

            const confirmStartRandom = () => {
                let allQs = topics.flatMap(t => t.questions);
                // Xáo trộn toàn bộ câu hỏi từ mọi chủ đề
                allQs = allQs.sort(() => 0.5 - Math.random());
                
                if (randomLimit > 0) {
                    allQs = allQs.slice(0, randomLimit);
                }

                onStart({ 
                    title: "Random Practice", 
                    questions: allQs 
                });
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden z-10">
                    {/* Glowing background orbs */}
                    <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-600/20 rounded-full blur-[120px] animate-blob"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-500/10 rounded-full blur-[120px] animate-blob animation-delay-2000"></div>

                    <div className="text-center mb-10 z-10 animate-fade-in flex flex-col items-center">
                        <Logo imgClass="h-28 sm:h-40 lg:h-48" className="mb-8 transform transition-transform hover:scale-110 cursor-default" />
                        
                        <h1 className="text-5xl md:text-7xl font-display font-black text-white tracking-tighter mb-4 drop-shadow-[0_0_20px_rgba(255,255,255,0.2)] mt-2">
                            Master Your <span className="text-gradient">English</span>
                        </h1>
                        <p className="text-gray-400 text-lg font-light tracking-wide max-w-xl mx-auto px-4">
                            Interactive Speaking Practice Simulator
                        </p>
                    </div>

                    {/* MÀN HÌNH 1: CHỌN CHẾ ĐỘ */}
                    {step === 'mode_select' && (
                        <div className="w-full max-w-4xl glass rounded-3xl p-8 sm:p-12 animate-slide-up z-10 border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative text-center">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-fuchsia-500 to-cyan-500 rounded-t-3xl"></div>
                            
                            <h2 className="text-3xl font-display font-bold text-white mb-8">Choose Practice Mode</h2>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <button onClick={() => setStep('random_config')} className="group flex flex-col items-center p-8 rounded-2xl bg-gradient-to-b from-white/10 to-white/5 border border-cyan-400/30 hover:border-cyan-400 hover:from-cyan-900/40 hover:to-cyan-900/10 transition-all duration-300 shadow-[0_0_20px_rgba(6,182,212,0.1)] hover:shadow-[0_0_30px_rgba(6,182,212,0.4)] transform hover:-translate-y-2">
                                    <div className="w-20 h-20 rounded-full bg-cyan-400/20 text-cyan-400 flex items-center justify-center text-4xl mb-6 shadow-[0_0_15px_rgba(6,182,212,0.5)] group-hover:scale-110 transition-transform border border-cyan-400/50">
                                        <i className="fa-solid fa-dice"></i>
                                    </div>
                                    <h3 className="text-2xl font-bold text-white mb-3">Luyện tập Ngẫu nhiên</h3>
                                    <p className="text-gray-400 text-sm leading-relaxed">Hệ thống sẽ xáo trộn các câu hỏi từ tất cả các chủ đề để thử thách phản xạ của bạn.</p>
                                </button>

                                <button onClick={() => setStep('topic_select')} className="group flex flex-col items-center p-8 rounded-2xl bg-gradient-to-b from-white/10 to-white/5 border border-fuchsia-400/30 hover:border-fuchsia-400 hover:from-fuchsia-900/40 hover:to-fuchsia-900/10 transition-all duration-300 shadow-[0_0_20px_rgba(217,70,239,0.1)] hover:shadow-[0_0_30px_rgba(217,70,239,0.4)] transform hover:-translate-y-2">
                                    <div className="w-20 h-20 rounded-full bg-fuchsia-400/20 text-fuchsia-400 flex items-center justify-center text-4xl mb-6 shadow-[0_0_15px_rgba(217,70,239,0.5)] group-hover:scale-110 transition-transform border border-fuchsia-400/50">
                                        <i className="fa-solid fa-list-check"></i>
                                    </div>
                                    <h3 className="text-2xl font-bold text-white mb-3">Luyện tập Theo chủ đề</h3>
                                    <p className="text-gray-400 text-sm leading-relaxed">Chọn các chủ đề cụ thể mà bạn muốn ôn tập và tùy chỉnh số lượng câu hỏi.</p>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MÀN HÌNH 2A: CẤU HÌNH RANDOM */}
                    {step === 'random_config' && (
                        <div className="w-full max-w-xl glass rounded-3xl p-10 animate-slide-up z-10 text-center border border-cyan-400/30 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                            <div className="w-20 h-20 rounded-full bg-cyan-400/20 text-cyan-400 flex items-center justify-center text-4xl mb-6 mx-auto shadow-[0_0_15px_rgba(6,182,212,0.5)] border border-cyan-400/50">
                                <i className="fa-solid fa-dice"></i>
                            </div>
                            <h2 className="text-3xl font-display font-bold text-white mb-4">Luyện tập Ngẫu nhiên</h2>
                            <p className="text-gray-400 mb-8 text-sm">Bạn muốn thử sức với bao nhiêu câu hỏi ngẫu nhiên?</p>
                            
                            <div className="flex flex-col items-center gap-6 mb-8">
                                <div className="bg-black/40 p-4 rounded-2xl border border-white/10 shadow-inner flex items-center gap-4">
                                    <span className="text-lg font-bold text-gray-300 uppercase tracking-wide">Số câu:</span>
                                    <input 
                                        type="number" 
                                        min="1" 
                                        value={randomLimit} 
                                        onChange={(e) => setRandomLimit(parseInt(e.target.value))}
                                        className="w-24 bg-cyan-900/30 border border-cyan-500/50 rounded-xl px-4 py-2 text-cyan-400 font-bold text-2xl text-center focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:bg-cyan-900 shadow-inner"
                                    />
                                </div>
                                <button 
                                    onClick={confirmStartRandom}
                                    className="w-full bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 text-white px-8 py-4 rounded-xl font-black text-lg shadow-[0_0_20px_rgba(6,182,212,0.4)] transition transform hover:scale-105 active:scale-95 flex items-center justify-center gap-3 border border-white/20"
                                >
                                    <i className="fa-solid fa-play"></i> Bắt đầu luyện tập
                                </button>
                            </div>
                            
                            <button onClick={() => setStep('mode_select')} className="text-gray-500 hover:text-cyan-400 text-sm font-bold uppercase tracking-wider transition flex items-center justify-center gap-2 mx-auto">
                                <i className="fa-solid fa-arrow-left"></i> Quay lại chọn chế độ
                            </button>
                        </div>
                    )}

                    {/* MÀN HÌNH 2B: CHỌN CHỦ ĐỀ */}
                    {step === 'topic_select' && (
                        <div className="w-full max-w-5xl glass rounded-3xl p-6 sm:p-10 animate-slide-up z-10 border border-fuchsia-400/30 shadow-[0_20px_50px_rgba(0,0,0,0.5)] relative">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-8 gap-6 border-b border-white/5 pb-6">
                                <div>
                                    <div className="flex items-center gap-3 mb-2">
                                        <button onClick={() => setStep('mode_select')} className="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition mr-2">
                                            <i className="fa-solid fa-arrow-left text-sm"></i>
                                        </button>
                                        <h2 className="text-2xl font-display font-bold text-white">Select Practice Topics</h2>
                                    </div>
                                    <p className="text-gray-400 text-sm ml-12">Choose the topics you want to review today</p>
                                </div>
                                <div className="flex items-center gap-4 bg-black/40 p-2.5 rounded-xl border border-white/10 shadow-inner">
                                    <span className="text-sm font-bold text-gray-300 ml-2 uppercase tracking-wide">Questions:</span>
                                    <input 
                                        type="number" 
                                        min="1" 
                                        value={questionLimit} 
                                        onChange={(e) => setQuestionLimit(parseInt(e.target.value))}
                                        className="w-20 bg-fuchsia-900/30 border border-fuchsia-500/30 rounded-lg px-3 py-1.5 text-fuchsia-400 font-bold text-center focus:outline-none focus:ring-2 focus:ring-fuchsia-400 focus:bg-fuchsia-900/50 shadow-inner"
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 max-h-[400px] overflow-y-auto custom-scrollbar pr-2 mb-8">
                                {topics.map(topic => {
                                    const isSelected = selectedIds.has(topic.id);
                                    return (
                                        <div 
                                            key={topic.id} 
                                            onClick={() => toggleTopic(topic.id)}
                                            className={`
                                                cursor-pointer p-5 rounded-2xl border text-center transition-all duration-300 relative overflow-hidden group backdrop-blur-sm
                                                ${isSelected 
                                                    ? 'bg-fuchsia-600/30 border-fuchsia-400 text-white shadow-[0_0_20px_rgba(217,70,239,0.3)]' 
                                                    : 'bg-white/5 border-white/10 text-gray-400 hover:bg-white/10 hover:border-white/30'}
                                            `}
                                        >
                                            <div className={`text-3xl mb-3 transition-transform group-hover:scale-110 ${isSelected ? 'text-fuchsia-400 drop-shadow-[0_0_10px_rgba(217,70,239,0.8)]' : 'text-gray-500'}`}>
                                                <i className={`fa-solid ${topic.icon}`}></i>
                                            </div>
                                            <div className="text-[11px] font-bold uppercase tracking-wider truncate px-1">{topic.displayTitle}</div>
                                            {isSelected && <div className="absolute top-2 right-2 text-cyan-400 text-sm shadow-sm"><i className="fa-solid fa-circle-check"></i></div>}
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="flex justify-center mt-2">
                                <button 
                                    onClick={handleStartTopicConfig}
                                    className="bg-gradient-to-r from-fuchsia-600 to-indigo-600 hover:from-fuchsia-500 hover:to-indigo-500 text-white px-12 py-4 rounded-2xl font-black text-lg shadow-[0_0_20px_rgba(217,70,239,0.4)] transition transform hover:scale-105 active:scale-95 flex items-center gap-3 border border-white/20"
                                >
                                    Tiếp tục <i className="fa-solid fa-arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MÀN HÌNH 3: XÁC NHẬN CHỦ ĐỀ */}
                    {step === 'topic_ready' && (
                        <div className="w-full max-w-2xl glass rounded-3xl p-10 animate-slide-up z-10 text-center border border-fuchsia-400/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                            <h2 className="text-4xl font-display font-bold text-white mb-3">Sẵn sàng?</h2>
                            <p className="text-gray-400 mb-10 text-lg">Bạn đã chọn <span className="text-cyan-400 font-bold px-1">{selectedIds.size}</span> chủ đề với giới hạn <span className="text-fuchsia-400 font-bold px-1">{questionLimit}</span> câu hỏi/chủ đề.</p>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <button onClick={() => confirmStartTopic('sequential')} className="group p-8 rounded-2xl bg-white/5 border border-white/10 hover:bg-indigo-600/20 hover:border-indigo-400/50 transition-all duration-300 backdrop-blur-sm shadow-lg">
                                    <div className="w-20 h-20 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-5 group-hover:scale-110 transition border border-indigo-400/30 group-hover:shadow-[0_0_20px_rgba(79,70,229,0.4)]">
                                        <i className="fa-solid fa-arrow-down-1-9 text-3xl"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-white mb-2">Học Theo Thứ Tự</h3>
                                    <p className="text-sm text-gray-400">Các câu hỏi sẽ hiện ra lần lượt.</p>
                                </button>

                                <button onClick={() => confirmStartTopic('random')} className="group p-8 rounded-2xl bg-white/5 border border-white/10 hover:bg-fuchsia-500/20 hover:border-fuchsia-400/50 transition-all duration-300 backdrop-blur-sm shadow-lg">
                                    <div className="w-20 h-20 bg-fuchsia-400/20 text-fuchsia-400 rounded-full flex items-center justify-center mx-auto mb-5 group-hover:scale-110 transition border border-fuchsia-400/30 group-hover:shadow-[0_0_20px_rgba(217,70,239,0.4)]">
                                        <i className="fa-solid fa-shuffle text-3xl"></i>
                                    </div>
                                    <h3 className="text-xl font-bold text-white mb-2">Học Xáo Trộn</h3>
                                    <p className="text-sm text-gray-400">Trộn lẫn các câu trong chủ đề đã chọn.</p>
                                </button>
                            </div>
                            
                            <button onClick={() => setStep('topic_select')} className="mt-10 text-gray-500 hover:text-fuchsia-400 text-sm font-bold uppercase tracking-wider transition">
                                <i className="fa-solid fa-arrow-left mr-2"></i> Quay lại chọn chủ đề
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [sessionData, setSessionData] = useState(null);
            const [showGuide, setShowGuide] = useState(false);
            
            const cleanTopics = useMemo(() => RAW_DATA.map(t => ({
                ...t,
                displayTitle: t.title.replace(/^Topic \d+ – /, ''),
                questions: t.questions.map((q, i) => ({
                    id: `${t.id}_q${i}`,
                    text: q.t,
                    audio: q.a,
                    sample: q.s,
                    sampleAudio: q.sa,
                    v: q.v
                }))
            })), []);

            return (
                <div className="min-h-screen font-sans flex flex-col relative">
                    {!sessionData ? (
                        <LandingPage 
                            topics={cleanTopics} 
                            onStart={(data) => setSessionData(data)} 
                        />
                    ) : (
                        <PracticeSession 
                            title={sessionData.title}
                            questions={sessionData.questions}
                            onBack={() => setSessionData(null)} 
                        />
                    )}

                    {/* Nút Hướng dẫn nổi ở mọi trang */}
                    <button 
                        onClick={() => setShowGuide(true)}
                        className="fixed bottom-24 lg:bottom-6 right-4 lg:right-6 z-[60] bg-gradient-to-r from-fuchsia-600 to-indigo-600 hover:from-fuchsia-500 hover:to-indigo-500 text-white rounded-full p-3 sm:px-4 sm:py-2 shadow-[0_0_15px_rgba(217,70,239,0.4)] hover:scale-105 transition flex items-center justify-center gap-2 border border-white/30 text-sm font-bold opacity-80 hover:opacity-100"
                    >
                        <i className="fa-solid fa-circle-info text-lg"></i>
                        <span className="hidden sm:inline">Hướng dẫn</span>
                    </button>

                    {/* Popup Hướng dẫn */}
                    <Modal isOpen={showGuide} onClose={() => setShowGuide(false)} title="📖 Hướng dẫn sử dụng">
                        <div className="text-gray-300 text-[15px] space-y-4 text-left">
                            <p>Chào mừng bạn đến với <strong>Jaxtina Speak</strong>! Dưới đây là các bước để luyện tập hiệu quả:</p>
                            <ul className="space-y-3 list-none mt-4">
                                <li className="flex gap-3 items-start bg-white/5 p-3 rounded-xl border border-white/5">
                                    <span className="text-cyan-400 bg-cyan-400/10 w-7 h-7 rounded-full flex items-center justify-center shrink-0 mt-0.5"><i className="fa-solid fa-1 text-xs"></i></span> 
                                    <span className="text-sm leading-relaxed"><strong>Chọn chế độ <i className="fa-solid fa-dice text-cyan-400 mx-1"></i>:</strong> Luyện tập <strong>Ngẫu nhiên</strong> (trộn mọi chủ đề) hoặc luyện tập <strong>Theo chủ đề</strong> cụ thể. Thiết lập số câu hỏi mong muốn.</span>
                                </li>
                                <li className="flex gap-3 items-start bg-white/5 p-3 rounded-xl border border-white/5">
                                    <span className="text-fuchsia-400 bg-fuchsia-400/10 w-7 h-7 rounded-full flex items-center justify-center shrink-0 mt-0.5"><i className="fa-solid fa-2 text-xs"></i></span> 
                                    <span className="text-sm leading-relaxed"><strong>Nghe & Trả lời <i className="fa-solid fa-microphone-lines text-fuchsia-400 mx-1"></i>:</strong> Bấm nghe câu hỏi và nhấn nút <strong className="text-fuchsia-400">Start Recording</strong> để ghi âm câu trả lời của bạn.</span>
                                </li>
                                <li className="flex gap-3 items-start bg-white/5 p-3 rounded-xl border border-white/5">
                                    <span className="text-indigo-400 bg-indigo-400/10 w-7 h-7 rounded-full flex items-center justify-center shrink-0 mt-0.5"><i className="fa-solid fa-3 text-xs"></i></span> 
                                    <span className="text-sm leading-relaxed"><strong>Sử dụng chiến lược <i className="fa-solid fa-chess-board text-indigo-400 mx-1"></i>:</strong> Bật gợi ý Từ vựng hoặc xem bảng Công thức <strong>PREF(C)</strong> bên tay phải để biết cách lên ý tưởng trả lời ăn điểm.</span>
                                </li>
                                <li className="flex gap-3 items-start bg-white/5 p-3 rounded-xl border border-white/5">
                                    <span className="text-emerald-400 bg-emerald-400/10 w-7 h-7 rounded-full flex items-center justify-center shrink-0 mt-0.5"><i className="fa-solid fa-4 text-xs"></i></span> 
                                    <span className="text-sm leading-relaxed"><strong>Nhận xét chi tiết <i className="fa-solid fa-ranking-star text-emerald-400 mx-1"></i>:</strong> Tải file MP3 vừa ghi âm xuống, bấm vào nút <strong className="text-cyan-400">Nhận xét cùng Jaxtina</strong> và gửi file để được sửa lỗi chi tiết!</span>
                                </li>
                            </ul>
                        </div>
                    </Modal>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
